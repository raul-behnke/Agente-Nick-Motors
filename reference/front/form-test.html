<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nick Motors — IA Pré-atendimento (Teste)</title>
  <style>
    @import url('https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap');

    :root {
      --green-400: #b5ff81;
      --green-500: #90cc67;
      --magenta-500: #cc3366;
      --neutral-0: #ffffff;
      --neutral-50: #f7fff2;
      --neutral-100: #e7e7e7;
      --neutral-200: #cccccc;
      --neutral-300: #b0b0b0;
      --neutral-600: #5c5c5c;
      --neutral-700: #3f444b;
      --neutral-800: #333333;
      --neutral-900: #141414;

      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;

      --radius-sm: 0.25rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-full: 9999px;

      --font-display: "Clash Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;

      --duration-fast: 150ms;
      --duration-normal: 300ms;
      --ease-out: cubic-bezier(0, 0, 0.2, 1);

      --bg-page: var(--neutral-0);
      --bg-surface: var(--neutral-50);
      --bg-input: var(--neutral-0);
      --bg-dark: var(--neutral-900);
      --text-primary: var(--neutral-800);
      --text-secondary: var(--neutral-600);
      --text-inverse: var(--neutral-0);
      --border-default: var(--neutral-200);
      --focus-ring: 0 0 0 3px rgba(181, 255, 129, 0.5);
      --action-primary-bg: var(--green-400);
      --action-primary-fg: var(--neutral-900);
      --action-primary-hover: var(--green-500);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-5);
      font-family: var(--font-body);
      color: var(--text-primary);
      background:
        radial-gradient(circle at 8% 10%, rgba(181, 255, 129, 0.35), transparent 48%),
        radial-gradient(circle at 92% 0%, rgba(204, 51, 102, 0.08), transparent 34%),
        linear-gradient(170deg, #ffffff, #f7fff2);
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      width: 100%;
      max-width: 42rem;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
      text-align: center;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.125rem;
    }

    .brand strong {
      margin: 0;
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }

    .brand span {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      box-shadow: 0 10px 28px rgba(20, 20, 20, 0.06);
      transition: transform var(--duration-normal) var(--ease-out),
                  box-shadow var(--duration-normal) var(--ease-out);
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(20, 20, 20, 0.1);
    }

    .row-1 {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-3);
    }

    label {
      display: block;
      margin-bottom: var(--space-2);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    input, select, textarea {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 1rem;
      font-family: var(--font-body);
      transition: border-color var(--duration-fast) var(--ease-out),
                  box-shadow var(--duration-fast) var(--ease-out);
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--green-500);
      box-shadow: var(--focus-ring);
    }

    textarea {
      min-height: 6.25rem;
      resize: vertical;
    }

    .btns {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      border: 1px solid transparent;
      cursor: pointer;
      padding: var(--space-3) var(--space-5);
      border-radius: var(--radius-md);
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      background: var(--action-primary-bg);
      color: var(--action-primary-fg);
      transition: background-color var(--duration-fast) var(--ease-out),
                  transform var(--duration-fast) var(--ease-out),
                  box-shadow var(--duration-fast) var(--ease-out);
    }

    button:hover:enabled {
      background: var(--action-primary-hover);
      transform: translateY(-1px);
    }

    button:active:enabled {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .pill {
      display: inline-flex;
      gap: var(--space-2);
      align-items: center;
      padding: 0.375rem 0.75rem;
      border-radius: var(--radius-full);
      background: var(--bg-dark);
      border: 1px solid var(--neutral-700);
      color: var(--text-inverse);
      font-size: 0.75rem;
      font-weight: 500;
    }

    .divider {
      height: 1px;
      background: var(--border-default);
      margin: var(--space-4) 0;
    }

    .log {
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      color: var(--text-inverse);
      background: var(--bg-dark);
      border: 1px solid var(--neutral-700);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      max-height: 13.75rem;
      overflow: auto;
    }

    .hidden { display: none; }
    .log-card { opacity: 1; }

    :focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <strong>Nick Motors — Teste do Agente IA (Pré-atendimento)</strong>
      </div>
      <div class="pill" id="statusPill">● <span id="statusText">Pronto</span></div>
    </div>

    <div class="card">
      <div class="row-1">
        <div>
          <label for="simulationType">Tipo de Simulação</label>
          <select id="simulationType">
            <option value="marketplace">Marketplace</option>
            <option value="whatsapp">WhatsApp</option>
          </select>
        </div>
        <div>
          <label for="testContact">Número para Teste (Nome)</label>
          <select id="testContact">
            <option value="thiago">Thiago | (11) 97564-4600</option>
            <option value="raul">Raul | (47) 99768-4618</option>
            <option value="aline">Aline | (11) 98268-3134</option>
          </select>
        </div>
      </div>

      <div id="marketplaceFields" class="row-1" style="margin-top:12px;">
        <div>
          <label for="marketplaceSource">Fonte (Marketplace)</label>
          <select id="marketplaceSource">
            <option value="WebMotors">WebMotors</option>
            <option value="OLX Autos">OLX Autos</option>
            <option value="iCarros">iCarros</option>
            <option value="Mercado Livre Veículos">Mercado Livre Veículos</option>
            <option value="Instagram/Ads">Instagram/Ads</option>
            <option value="Indicação">Indicação</option>
          </select>
        </div>
        <div>
          <label for="vehicleInterest">Veículo de Interesse</label>
          <select id="vehicleInterest">
            <option value="Caoa Chery/Chery Tiggo 2 ACT 1.5 16V Flex Aut.5p - Prata - 2020">Caoa Chery/Chery Tiggo 2 ACT 1.5 16V Flex Aut.5p - Prata - 2020</option>
            <option value="VolksWagen T-Cross Comfor. 200 TSI 1.0 Flex 5p Aut. - Preto - 2022">VolksWagen T-Cross Comfor. 200 TSI 1.0 Flex 5p Aut. - Preto - 2022</option>
            <option value="Toyota Hilux SW4 SRX 4x4 2.8 TDI 16V Dies. Aut. - Prata - 2021">Toyota Hilux SW4 SRX 4x4 2.8 TDI 16V Dies. Aut. - Prata - 2021</option>
            <option value="Lamborghini Huracán EVO 5.2 V10 Aut. - Amarelo - 2024 (NÃO EXISTE NO ESTOQUE)">Lamborghini Huracán EVO 5.2 V10 Aut. - Amarelo - 2024 (NÃO EXISTE NO ESTOQUE)</option>
          </select>
        </div>
      </div>

      <div class="btns" style="margin-top:14px;">
        <button id="btnPrepare">INICIAR SIMULAÇÃO</button>
      </div>
    </div>

    <div class="card log-card">
      <label>Log</label>
      <div class="divider"></div>
      <div class="log" id="log"></div>
    </div>
  </div>

<script>
/**
 * CONFIG — parâmetros hardcoded
 */
const API_BASE = "https://services.leadconnectorhq.com";
const API_VERSION = "2021-07-28"; // header Version requerido nos endpoints de Contacts :contentReference[oaicite:4]{index=4}
const HARDCODED_TOKEN = "pit-cd27978f-47f7-4a44-afd5-68e7e98bf627";
const HARDCODED_LOCATION_ID = "PU8y2Tjx1xqN728ysqR5";
const HARDCODED_ASSIGNED_TO = "vDQvfVpBUV3Vh1NPqg9Q";
const HARDCODED_TAG = "agente-ia";
const CUSTOM_FIELD_VEHICLE_ID = "f4te7d77VTNo4BjN9Ify";
const WORKFLOW_ID_MARKETPLACE = "20a91474-0a55-4b7e-89d5-bf5b805f9799";
const WORKFLOW_ID_WHATSAPP = "20a91474-0a55-4b7e-89d5-bf5b805f9799";
const TEST_CONTACTS = {
  thiago: { name: "Thiago", phone: "(11) 97564-4600" },
  raul: { name: "Raul", phone: "(47) 99768-4618" },
  aline: { name: "Aline", phone: "(11) 98268-3134" }
};

/**
 * Estado do app
 */
let preparedContact = null; // { id, name, phone, ... }

/**
 * Helpers UI
 */
const $ = (id) => document.getElementById(id);
const logEl = $("log");
const LOG_DISPLAY_MS = 450;
const logQueue = [];
let logTimer = null;

function log(msg) {
  logQueue.push(msg);
  flushLogQueue();
}

function flushLogQueue() {
  if (logTimer || logQueue.length === 0) return;
  const msg = logQueue.shift();
  const line = `[${new Date().toLocaleTimeString("pt-BR", { hour12: false })}] ${msg}`;
  logEl.textContent = line;
  logEl.scrollTop = logEl.scrollHeight;
  logTimer = window.setTimeout(() => {
    logTimer = null;
    flushLogQueue();
  }, LOG_DISPLAY_MS);
}

function clearLogs() {
  logQueue.length = 0;
  if (logTimer) {
    window.clearTimeout(logTimer);
    logTimer = null;
  }
  logEl.textContent = "";
}

function setStatus(text, ok=true) {
  $("statusText").textContent = text;
  $("statusPill").style.opacity = ok ? "1" : "0.9";
}

function normalizeBRPhone(phoneRaw) {
  // remove tudo que não é dígito, preserva + na frente
  const digits = phoneRaw.replace(/[^\d]/g, "");
  // se já vier com 55 e DDD, mantém
  // gera E.164: +55XXXXXXXXXXX
  return digits.startsWith("55") ? `+${digits}` : `+55${digits}`;
}

function isMarketplaceSimulation() {
  return $("simulationType").value === "marketplace";
}

function getSelectedTestContact() {
  const key = $("testContact").value;
  return TEST_CONTACTS[key] || TEST_CONTACTS.thiago;
}

function toggleSimulationFields() {
  $("marketplaceFields").classList.toggle("hidden", !isMarketplaceSimulation());
}

/**
 * HTTP helper
 */
async function request(path, { method="GET", token, query, body } = {}) {
  const url = new URL(API_BASE + path);
  if (query) Object.entries(query).forEach(([k, v]) => url.searchParams.set(k, v));

  const res = await fetch(url.toString(), {
    method,
    headers: {
      "Authorization": `Bearer ${token}`,
      "Version": API_VERSION,
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: body ? JSON.stringify(body) : undefined
  });

  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch { data = { raw: text }; }

  if (!res.ok) {
    const err = new Error(`HTTP ${res.status} — ${res.statusText}`);
    err.status = res.status;
    err.data = data;
    throw err;
  }
  return data;
}

/**
 * 1) Buscar contato por telefone
 * - Primeiro tenta POST /contacts/search (como você pediu). A doc do portal não detalha o body. :contentReference[oaicite:5]{index=5}
 * - Se falhar, usa GET /contacts/search/duplicate (documentado e confiável). :contentReference[oaicite:6]{index=6}
 */
async function findContactByPhone({ token, locationId, phoneE164 }) {
  // Tentativa A: POST /contacts/search (body "provável")
  try {
    const data = await request("/contacts/search", {
      method: "POST",
      token,
      body: {
        locationId,
        // Estrutura pode variar; aqui é um "best effort" p/ achar pelo termo
        // Se sua conta exigir outro formato, me mande um exemplo do body que funciona e eu ajusto.
        searchTerm: phoneE164
      }
    });

    // tentativas de extrair lista (pode variar conforme resposta)
    const list =
      data?.contacts ||
      data?.data?.contacts ||
      data?.data ||
      data?.results ||
      [];

    const match = Array.isArray(list)
      ? list.find(c => (c.phone || c?.contact?.phone) && String(c.phone || c?.contact?.phone).includes(phoneE164.replace("+","")))
      : null;

    if (match) return match.contact || match;
    return null;
  } catch (e) {
    log("Busca padrão falhou. Tentando busca alternativa...");
  }

  // Tentativa B (fallback): GET /contacts/search/duplicate?locationId=...&number=... (number precisa URL-encoded, + vira %2B) :contentReference[oaicite:7]{index=7}
  const dup = await request("/contacts/search/duplicate", {
    method: "GET",
    token,
    query: {
      locationId,
      number: phoneE164
    }
  });

  // A resposta pode variar; normalmente vem o contato duplicado (ou vazio)
  const contact = dup?.contact || dup?.data?.contact || dup?.data || dup?.duplicateContact || null;
  return contact || null;
}

async function deleteContact({ token, contactId }) {
  // DELETE /contacts/:contactId :contentReference[oaicite:8]{index=8}
  return request(`/contacts/${encodeURIComponent(contactId)}`, { method: "DELETE", token });
}

async function createContact({ token, payload }) {
  // POST /contacts/ :contentReference[oaicite:9]{index=9}
  return request("/contacts/", { method: "POST", token, body: payload });
}

async function updateContact({ token, contactId, payload }) {
  // PUT /contacts/:contactId
  return request(`/contacts/${encodeURIComponent(contactId)}`, {
    method: "PUT",
    token,
    body: payload
  });
}

async function addContactToWorkflow({ token, contactId, workflowId, locationId }) {
  const attempts = [
    () => request(`/contacts/${encodeURIComponent(contactId)}/workflow/${encodeURIComponent(workflowId)}`, { method: "POST", token }),
    () => request(`/contacts/${encodeURIComponent(contactId)}/workflow/${encodeURIComponent(workflowId)}`, {
      method: "POST",
      token,
      body: { locationId }
    }),
    () => request(`/contacts/${encodeURIComponent(contactId)}/workflows/${encodeURIComponent(workflowId)}`, {
      method: "POST",
      token,
      body: { locationId }
    })
  ];

  let lastError = null;
  for (const attempt of attempts) {
    try {
      return await attempt();
    } catch (e) {
      lastError = e;
    }
  }

  throw lastError || new Error("Não foi possível adicionar o contato ao workflow.");
}

/**
 * Fluxo principal: buscar → deletar (se existir) → criar de novo
 */
async function prepareContact() {
  clearLogs();
  const token = HARDCODED_TOKEN;
  const locationId = HARDCODED_LOCATION_ID;
  const simulationType = $("simulationType").value;
  const isMarketplace = simulationType === "marketplace";
  const workflowId = isMarketplace ? WORKFLOW_ID_MARKETPLACE : WORKFLOW_ID_WHATSAPP;
  const source = isMarketplace ? $("marketplaceSource").value : "WhatsApp";
  const vehicleInterest = isMarketplace ? $("vehicleInterest").value : null;
  const selectedContact = getSelectedTestContact();
  const phoneE164 = normalizeBRPhone(selectedContact.phone);
  const name = selectedContact.name;
  const assignedTo = HARDCODED_ASSIGNED_TO;
  const tag = HARDCODED_TAG;

  setStatus("Processando...");
  log(`Iniciando (${source})`);
  log(`Contato: ${name} (${selectedContact.phone})`);
  if (isMarketplace) {
    log(`Veículo: ${vehicleInterest}`);
  } else {
    log("WhatsApp: sem campos adicionais");
  }

  // 1) buscar
  const existing = await findContactByPhone({ token, locationId, phoneE164 });
  if (existing?.id) {
    log("Usuário encontrado");
    await deleteContact({ token, contactId: existing.id });
    log("Usuário deletado");
  } else {
    log("Usuário não encontrado");
  }

  // 2) criar
  const payload = {
    name,
    phone: phoneE164,
    locationId,
    assignedTo,
    tags: [tag]
  };
  if (isMarketplace) {
    payload.source = source;
    if (vehicleInterest) {
      payload.customFields = [
        {
          id: CUSTOM_FIELD_VEHICLE_ID,
          field_value: vehicleInterest
        }
      ];
    }
  }

  const created = await createContact({ token, payload });
  preparedContact = created?.contact || created;
  const createdId = preparedContact?.id;
  if (!createdId) {
    throw new Error("Contato criado sem ID.");
  }

  log(`Usuário criado (${createdId})`);

  if (isMarketplace && vehicleInterest) {
    await updateContact({
      token,
      contactId: createdId,
      payload: {
        source,
        customFields: [
          {
            id: CUSTOM_FIELD_VEHICLE_ID,
            field_value: vehicleInterest
          }
        ]
      }
    });
    log("Custom field do veículo atualizado");
  }

  await addContactToWorkflow({
    token,
    contactId: createdId,
    workflowId,
    locationId
  });
  log(`Usuário adicionado ao workflow (${workflowId})`);
  setStatus("Usuário pronto");
}

$("btnPrepare").addEventListener("click", async () => {
  $("btnPrepare").disabled = true;
  try {
    await prepareContact();
  } catch (e) {
    console.error(e);
    setStatus("Erro", false);
    log(`Erro: ${e.message}`);
  } finally {
    $("btnPrepare").disabled = false;
  }
});
$("simulationType").addEventListener("change", toggleSimulationFields);
toggleSimulationFields();
log("Tela pronta.");
</script>
</body>
</html>
