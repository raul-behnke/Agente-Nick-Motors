name: nick-motors

services:
  postgres:
    image: postgres:16-alpine
    container_name: nick_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: nick
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
      POSTGRES_DB: nick_agent
    volumes:
      - pg_data:/var/lib/postgresql/data
    # Postgres só na rede interna do compose — sem porta exposta no host
    # (evita conflito com outros postgres já rodando na VPS).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nick -d nick_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: nick_app_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://nick:${POSTGRES_PASSWORD}@postgres:5432/nick_agent
    depends_on:
      postgres:
        condition: service_healthy
    # App escuta 127.0.0.1:8000 — nginx host-level faz proxy + TLS.
    # NÃO publica em 0.0.0.0 pra evitar bypass do nginx.
    ports:
      - "127.0.0.1:8100:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pg_data:
